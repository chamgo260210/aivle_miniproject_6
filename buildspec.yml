version: 0.2

phases:
  install:
    runtime-versions:
      java: corretto17
      nodejs: 20
    commands:
      - echo "Install phase started"
      - java -version
      - node -v
      - npm -v

  pre_build:
    commands:
      - echo "Pre build phase started"
      - echo "Install frontend dependencies"
      - cd frontend
      - npm ci
      - cd ..

  build:
    commands:
      - echo "Build phase started"

      - echo "Build frontend"
      - cd frontend
      - npm run build
      - cd ..

      - echo "Build backend"
      - cd backend
      - chmod +x gradlew
      - ./gradlew clean bootJar -x test
      - cd ..

  post_build:
    commands:
      - echo "Post build phase started"
      - mkdir -p package
      - cp backend/build/libs/*.jar package/app.jar
      - cp -r frontend/dist package/frontend-dist
      - cp appspec.yml package/appspec.yml
      - cp -r scripts package/scripts
      - echo "Build artifact packaging complete"

artifacts:
  base-directory: package
  files:
    - '**/*'